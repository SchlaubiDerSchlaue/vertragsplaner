{% extends "base.html" %}

{% block content %}
<h1>{% if token.id %}API-Token bearbeiten{% else %}Neuer API-Token{% endif %}</h1>

<form method="post" class="card p-3">
    <div class="mb-3">
        <label class="form-label" for="name">Name</label>
        <input class="form-control" id="name" name="name" value="{{ token.name or '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label" for="role">Rolle</label>
        <select class="form-select" id="role" name="role">
            {% for role in ["read", "write", "admin"] %}
            <option value="{{ role }}" {% if token.role == role %}selected{% endif %}>{{ role }}</option>
            {% endfor %}
        </select>
    </div>
    <label class="form-check mb-3">
        <input class="form-check-input" type="checkbox" name="is_active" {% if token.is_active %}checked{% endif %}>
        Aktiv
    </label>
    <button class="btn btn-primary" type="submit">Speichern</button>
</form>
{% endblock %}
