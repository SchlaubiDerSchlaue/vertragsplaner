{% extends "base.html" %}

{% block content %}
<h1>{% if mode == "new" %}Position erfassen{% else %}Position bearbeiten{% endif %}</h1>
<p class="text-muted">{{ contract.title }} / {{ contract.customer.name }}</p>

<form method="post" class="mt-3">
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label" for="name">Name *</label>
            <input class="form-control" id="name" name="name" value="{{ position.name or '' }}" required>
        </div>
        <div class="col-md-2">
            <label class="form-label" for="position_type">Typ</label>
            <select class="form-select" id="position_type" name="position_type">
                {% for position_type in ["revenue", "cost"] %}
                <option value="{{ position_type }}" {% if position.position_type == position_type %}selected{% endif %}>{{ position_type }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label" for="status">Status</label>
            <select class="form-select" id="status" name="status">
                {% for status in ["active", "inactive"] %}
                <option value="{{ status }}" {% if position.status == status %}selected{% endif %}>{{ status }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label" for="sort_order">Sortierung</label>
            <input class="form-control" id="sort_order" name="sort_order" type="number" value="{{ position.sort_order or 0 }}">
        </div>
    </div>

    <div class="mt-4 d-flex gap-2">
        <button class="btn btn-primary" type="submit">Speichern</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('contracts.contract_detail', contract_id=contract.id) }}">Abbrechen</a>
    </div>
</form>
{% endblock %}
