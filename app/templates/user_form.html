{% extends "base.html" %}

{% block content %}
<h1>{% if mode == "new" %}Neuer Benutzer{% else %}Benutzer bearbeiten{% endif %}</h1>

<form method="post" class="card p-3">
    <div class="mb-3">
        <label class="form-label" for="username">Benutzername</label>
        <input class="form-control" id="username" name="username" value="{{ user.username or '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label" for="password">Passwort</label>
        <input class="form-control" id="password" name="password" type="password" {% if mode == "new" %}required{% endif %}>
        {% if mode != "new" %}
        <div class="form-text">Leer lassen, um das Passwort unveraendert zu lassen.</div>
        {% endif %}
    </div>
    <div class="mb-3">
        <label class="form-label" for="role">Rolle</label>
        <select class="form-select" id="role" name="role">
            {% for role in ["read", "write", "admin"] %}
            <option value="{{ role }}" {% if user.role == role %}selected{% endif %}>{{ role }}</option>
            {% endfor %}
        </select>
    </div>
    <label class="form-check mb-3">
        <input class="form-check-input" type="checkbox" name="is_active" {% if user.is_active %}checked{% endif %}>
        Aktiv
    </label>
    <button class="btn btn-primary" type="submit">Speichern</button>
</form>
{% endblock %}
